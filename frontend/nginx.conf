server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /auth/ {
    proxy_pass http://backend:3001;
  }

  location /api/ {
    proxy_pass http://backend:3001;
  }

  location /uploads/ {
    proxy_pass http://backend:3001;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
